<!DOCTYPE html>
<html>
<head>
    <title>CarbonAxis Admin Login</title>

    <style>
        body{
            background:#081511;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:350px;
            padding:30px;
            background:#0f1f19;
            border-radius:10px;
            text-align:center;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:12px;
            background:#00e5b0;
            border:none;
            cursor:pointer;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="box">

    <h2>CarbonAxis Admin</h2>

    <input
        type="password"
        id="password"
        placeholder="Enter Admin Password">

    <button onclick="login()">
        Login
    </button>

</div>

<script>

function login(){

    const password =
        document.getElementById("password").value;

    if(password === "CarbonAxisAdmin2026"){

        localStorage.setItem(
            "adminLoggedIn",
            "true"
        );

        window.location.href =
            "admin.html";

    }else{

        alert("Invalid Password");

    }

}

</script>

</body>
</html>
