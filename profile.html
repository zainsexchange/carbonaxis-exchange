<!DOCTYPE html>
<html lang="en">

<head>
    

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Profile | CarbonAxis Exchange</title>

<link rel="stylesheet" href="/style.css">

<link rel="stylesheet" href="/css/carbon-ui/smart-select.css">
<link rel="stylesheet" href="/css/profile.css">

<link rel="icon"
type="image/png"
href="/favicon.png">

</head>

<body>
    <header>
    <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Climate Intelligence Dashboard | CarbonAxis Exchange</title>
  <meta name="description" content="CarbonAxis Exchange is building institutional climate market infrastructure for transparent carbon trading, verified climate projects, and scalable climate finance." />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <meta property="og:type" content="website">
<meta property="og:site_name" content="CarbonAxis Exchange">
<meta property="og:title" content="CarbonAxis Exchange | Building Trusted Climate Markets">
<meta property="og:description" content="Trusted climate market infrastructure for carbon credits, climate projects and environmental assets.">
<meta property="og:image" content="https://carbonaxisexchange.com/og-image.png">
<meta property="og:url" content="https://carbonaxisexchange.com">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="CarbonAxis Exchange">
<meta name="twitter:description" content="Building Trusted Climate Markets">
<meta name="twitter:image" content="https://carbonaxisexchange.com/og-image.png">
</header>
<main class="profile-page">
  <section class="profile-hero">
    <div class="container">
      <p class="section-label">Account</p>
      <h1>My Profile</h1>
      <p class="profile-subtitle">
        Manage your CarbonAxis Exchange account information.
      </p>
    </div>
  </section>

  <section class="profile-section">
    <div class="container">
      <div class="profile-card">
        <div class="profile-card-head">
          <div class="profile-avatar-large" id="profileAvatarLarge">CA</div>
          <div>
            <h2>Personal Information</h2>
            <p>Update your personal and professional details.</p>
          </div>
        </div>

        <form id="profileForm" class="profile-form">
          <div class="form-grid">
            <label>
              Full Name
              <input type="text" id="name">
            </label>

            <label>
              Email Address
              <input type="email" id="email" readonly>
            </label>

            <label>
              Company
              <input type="text" id="company">
            </label>

            <label>
              Country
              <input
type="text"
id="country"
autocomplete="off">
            </label>

            <label>
              Phone
              <input type="text" id="phone">
            </label>

            <label>
              Job Title
              <input
type="text"
id="jobTitle"
autocomplete="off">
            </label>

            <label>
              Industry
              <input
type="text"
id="industry"
autocomplete="off">
            </label>

            <label>
              Website
              <input type="text" id="website">
            </label>

            <label class="full-width">
              LinkedIn
              <input type="text" id="linkedin">
            </label>

            <label class="full-width">
              Bio
              <textarea id="bio"></textarea>
            </label>
          </div>

          <div class="profile-actions">
            <button type="submit" class="btn btn-primary">
              Save Changes
            </button>
            <a href="/dashboard.html" class="btn btn-secondary">
  Back to Dashboard
</a>

            <p id="profileMessage" class="profile-message"></p>
          </div>
        </form>
      </div>
    </div>
  </section>
</main>
<script src="/js/api.js"></script>
<script src="/js/data.js"></script>
<script src="/js/navbar.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/carbon-ui/smart-select.js"></script>
<script src="/js/profile.js"></script>
</body>
</html>
