<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | CarbonAxis Exchange</title>

<link rel="stylesheet" href="style.css">

<style>

.login-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#081511;
}

.login-box{
    width:420px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(0,229,176,0.15);
    border-radius:20px;
    padding:40px;
    backdrop-filter:blur(15px);
}

.login-box h1{
    text-align:center;
    margin-bottom:25px;
}

.login-box input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border-radius:10px;
    border:none;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00e5b0;
    color:black;
    font-weight:700;
    cursor:pointer;
}

.login-footer{
    text-align:center;
    margin-top:20px;
}

.login-footer a{
    color:#00e5b0;
}

</style>

</head>

<body>

<div class="login-page">

<div class="login-box">

<h1>Login</h1>

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<button
class="login-btn"
onclick="loginUser()">
Login </button>

<div class="login-footer">

<p>
Don't have an account?
<a href="register.html">
Register
</a>
</p>

</div>

</div>

</div>

<script>

async function loginUser(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

const response = await fetch(
"https://carbonaxis-exchange.onrender.com/api/login",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
password
})
}
);

const data =
await response.json();
console.log(data);

if(data.success){

localStorage.setItem(
"token",
data.token
);

localStorage.setItem(
"user",
JSON.stringify(data.user)
);

alert("Login Successful");

window.location.href =
"dashboard.html";

}else{

alert(data.message);

}

}catch(error){

console.error(error);

alert(data.message || "Login Failed");

}

}

</script>

</body>
</html>
