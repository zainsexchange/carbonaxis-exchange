<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | CarbonAxis Exchange</title>

<link rel="stylesheet" href="style.css">

<link rel="icon" type="image/png" href="/favicon.png">

<style>

.login-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#081511;
}

.login-box{
    width:420px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(0,229,176,0.15);
    border-radius:20px;
    padding:40px;
    backdrop-filter:blur(15px);
}

.login-box h1{
    text-align:center;
    margin-bottom:25px;
}

.login-box input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border-radius:10px;
    border:none;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00e5b0;
    color:black;
    font-weight:700;
    cursor:pointer;
}

.login-footer{
    text-align:center;
    margin-top:20px;
}

.login-footer a{
    color:#00e5b0;
}
.login-message{
    margin-top:15px;
    text-align:center;
    font-size:14px;
    font-weight:600;
}

.login-message.success{
    color:#00e5b0;
}

.login-message.error{
    color:#ff5c5c;
}

</style>

</head>

<body>

<div class="login-page">

<div class="login-box">

<h1>Login</h1>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button
type="submit"
class="login-btn">
Login
</button>
<p id="loginMessage" class="login-message"></p>
</form>

<div class="login-footer">

<p>
Don't have an account?
<a href="register.html">
Register
</a>
</p>

</div>

</div>
</div>
<script src="/js/api.js"></script>
<script>

const loginForm =
document.getElementById("loginForm");

const loginMessage =
document.getElementById("loginMessage");

loginForm.addEventListener("submit", function(e){

    e.preventDefault();

    loginUser();

});

function showMessage(message, type){

    loginMessage.innerText = message;

    loginMessage.className =
    "login-message " + type;

}

async function loginUser(){

    const email =
    document.getElementById("email").value.trim();

    const password =
    document.getElementById("password").value.trim();

    if(!email || !password){

        showMessage(
            "Please enter email and password.",
            "error"
        );

        return;

    }

    showMessage(
        "Checking your credentials...",
        "success"
    );

    try{

        const response = await fetch(
            `${API.BASE}${API.login}`,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    email,
                    password
                })
            }
        );

        const data =
        await response.json();

        if(data.success){

            localStorage.setItem(
                "token",
                data.token
            );

            localStorage.setItem(
                "user",
                JSON.stringify(data.user)
            );

            showMessage(
                "Login successful. Redirecting...",
                "success"
            );

            setTimeout(function(){

                window.location.href =
                "dashboard.html";

            },800);

        }else{

            showMessage(
                data.message ||
                "Invalid email or password.",
                "error"
            );

        }

    }catch(error){

        console.error(error);

        showMessage(
            "Unable to connect to server.",
            "error"
        );

    }

}

</script>
</body>
</html>
